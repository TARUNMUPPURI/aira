---
# ── aria-api Deployment ───────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aria-api
  namespace: default
  labels:
    app.kubernetes.io/name: aria
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aria-api
  template:
    metadata:
      labels:
        app: aria-api
    spec:
      containers:
        - name: aria-api
          image: aria:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
          envFrom:
            - configMapRef:
                name: aria-config
            - secretRef:
                name: aria-secrets   # must contain GEMINI_API_KEY, APPROVAL_WEBHOOK_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          volumeMounts:
            - name: chroma-storage
              mountPath: /app/chroma_data
      volumes:
        - name: chroma-storage
          persistentVolumeClaim:
            claimName: aria-chroma-pvc

---
# ── aria-chroma PersistentVolumeClaim ─────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aria-chroma-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# ── aria-dashboard Deployment ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aria-dashboard
  namespace: default
  labels:
    app.kubernetes.io/name: aria
    app.kubernetes.io/component: dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aria-dashboard
  template:
    metadata:
      labels:
        app: aria-dashboard
    spec:
      containers:
        - name: aria-dashboard
          image: aria:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
          command:
            - streamlit
            - run
            - dashboard/app.py
            - --server.port=8501
            - --server.address=0.0.0.0
            - --server.headless=true
          envFrom:
            - configMapRef:
                name: aria-config
          env:
            - name: ARIA_API_URL
              value: "http://aria-api-service:80"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

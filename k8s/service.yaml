---
# ── aria-api-service (LoadBalancer) ───────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: aria-api-service
  namespace: default
  labels:
    app.kubernetes.io/name: aria
    app.kubernetes.io/component: api
spec:
  type: LoadBalancer
  selector:
    app: aria-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000

---
# ── aria-dashboard-service (LoadBalancer) ─────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: aria-dashboard-service
  namespace: default
  labels:
    app.kubernetes.io/name: aria
    app.kubernetes.io/component: dashboard
spec:
  type: LoadBalancer
  selector:
    app: aria-dashboard
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8501

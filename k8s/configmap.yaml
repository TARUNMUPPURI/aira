apiVersion: v1
kind: ConfigMap
metadata:
  name: aria-config
  namespace: default
  labels:
    app.kubernetes.io/name: aria
    app.kubernetes.io/component: config
data:
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"
  CHROMA_PERSIST_DIR: "/app/chroma_data"
  RISK_LOW_THRESHOLD: "35"
  RISK_HIGH_THRESHOLD: "70"
  LOG_LEVEL: "INFO"

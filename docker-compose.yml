version: "3.9"

# ── Shared build reference ────────────────────────────────────────────────────
x-aria-build: &aria-build
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  restart: unless-stopped

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── Zookeeper ───────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: aria-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log

  # ── Kafka ───────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: aria-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - kafka-data:/var/lib/kafka/data

  # ── ARIA FastAPI ─────────────────────────────────────────────────────────────
  aria-api:
    <<: *aria-build
    container_name: aria-api
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      API_PORT: "8000"
    volumes:
      - chroma-store:/app/chroma_data
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; r=httpx.get('http://localhost:8000/health',timeout=3); exit(0 if r.status_code==200 else 1)"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 15s
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]

  # ── ARIA gRPC ────────────────────────────────────────────────────────────────
  aria-grpc:
    <<: *aria-build
    container_name: aria-grpc
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "50051:50051"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      GRPC_PORT: "50051"
    volumes:
      - chroma-store:/app/chroma_data
    command: ["python", "grpc_server.py"]

  # ── ARIA Dashboard ───────────────────────────────────────────────────────────
  aria-dashboard:
    <<: *aria-build
    container_name: aria-dashboard
    depends_on:
      aria-api:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      ARIA_API_URL: http://aria-api:8000
    command:
      - streamlit
      - run
      - dashboard/app.py
      - --server.port=8501
      - --server.address=0.0.0.0
      - --server.headless=true

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  chroma-store:
